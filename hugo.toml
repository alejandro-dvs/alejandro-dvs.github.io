baseURL = "https://alejandro-dvs.github.io/"
languageCode = "en-us"
title = "Alejandro del Valle"
theme = "academic-minimal"

# Disable default RSS, sitemap handled separately
disableKinds = ["taxonomy", "term"]

[params]
  description = "Development economist specializing in environmental risks, natural disasters, and climate adaptation"
  author = "Alejandro del Valle"

  # Contact
  email = "adelvalle@gsu.edu"
  office = "35 Broad Street NW, Office 1141, Atlanta, GA 30303"

  # Social links
  google_scholar = "https://scholar.google.fr/citations?user=J63R7d4AAAAJ"
  orcid = "https://orcid.org/0000-0001-6614-2675"
  github = "https://github.com/alejandro-dvs"
  linkedin = "https://linkedin.com/in/alejandrodvs"
  bluesky = "https://bsky.app/profile/alejandrodvs.bsky.social"
  gsu_profile = "https://robinson.gsu.edu/profile/alejandro-del-valle/"

  # CV
  cv_url = "/files/cv.pdf"

  # Design
  accent_color = "#1a5f5a"  # Deep teal - environmental theme

[markup]
