{{ define "main" }}
<article class="page-section">
  <div class="section-inner" style="max-width: var(--content-width);">
    <header class="section-header">
      <h1 class="section-title">{{ .Title }}</h1>
    </header>
    <div class="page-content">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
