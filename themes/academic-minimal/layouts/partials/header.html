<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-name" aria-label="Home">
      <span class="name-text">Alejandro del Valle</span>
    </a>

    <nav class="main-nav" aria-label="Main navigation">
      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>

      <ul id="nav-menu" class="nav-menu">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" {{ if eq .URL $.RelPermalink }}aria-current="page"{{ end }}{{ if strings.HasSuffix .URL ".pdf" }} target="_blank" rel="noopener"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
